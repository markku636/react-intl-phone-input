<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>react-intl-phone-input — demo</title>
    <link rel="stylesheet" href="./demo.css" />
    <style>
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        background: #f1f5f9;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
          Helvetica, Arial, sans-serif;
        color: #0f172a;
      }
      .page {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 32px;
      }
      .card {
        width: 440px;
        background: #fff;
        border-radius: 16px;
        padding: 28px 28px 24px;
        box-shadow: 0 10px 30px rgba(15, 23, 42, 0.12);
      }
      .title {
        margin: 0;
        font-size: 20px;
        font-weight: 700;
      }
      .subtitle {
        margin: 4px 0 20px;
        font-size: 13px;
        color: #64748b;
      }
      .field {
        margin-bottom: 18px;
      }
      .field__label {
        display: block;
        margin-bottom: 6px;
        font-size: 13px;
        font-weight: 600;
        color: #334155;
      }
      .status {
        margin-top: 6px;
        font-size: 12px;
        font-weight: 600;
      }
      .status--ok {
        color: #16a34a;
      }
      .status--bad {
        color: #ef4444;
      }
      .field__value {
        margin-top: 4px;
        font-size: 11px;
        color: #94a3b8;
        font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script src="./demo.js"></script>
  </body>
</html>
